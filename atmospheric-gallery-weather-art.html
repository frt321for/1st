<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmospheric Gallery | Weather Art</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts: Playfair Display (Serif), JetBrains Mono (Code), Inter (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Import Map for React & Three.js (Fixed for Singleton React Instance) -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.3.1",
                "react-dom": "https://esm.sh/react-dom@18.3.1",
                "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
                "three": "https://esm.sh/three@0.160.0",
                "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom",
                "lucide-react": "https://esm.sh/lucide-react@0.300.0?external=react,react-dom"
            }
        }
    </script>

    <!-- Tailwind Config for Custom Fonts/Colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'void': '#080808',
                        'paper': '#F2F0E9',
                        'concrete': '#8C8C8C',
                        'signal-orange': '#D94E1F',
                        'signal-blue': '#2B4C7E',
                        'signal-green': '#1E4532',
                    },
                    backgroundImage: {
                        'grain': "url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIi8+CjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiNjY2MiLz4KPC9zdmc+')",
                    }
                }
            }
        }
    </script>

    <!-- React & Babel (Fixed Version) -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #080808; }
        /* Custom Scrollbar hide */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Subtle Noise Overlay */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Removed 'env' from data-presets to prevent transpiling import to require -->
    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as THREE from 'three';
        import { motion, AnimatePresence } from 'framer-motion';
        import { Wind, Droplets, Thermometer, MapPin, ArrowUpRight, Cloud, Sun, Snowflake, CloudRain } from 'lucide-react';

        // --- 1. Weather Data (Mock Real Data) ---
        const CITIES = [
            {
                id: 1,
                name: "KYOTO",
                country: "JPN",
                temp: 18,
                condition: "Clear",
                desc: "Moonlit Clarity",
                humidity: 45,
                wind: 12,
                color: "#D4AF37", // Gold
                bg: "bg-[#1a1a1a]",
                coordinates: "35.01N, 135.76E"
            },
            {
                id: 2,
                name: "REYKJAVIK",
                country: "ISL",
                temp: -4,
                condition: "Snow",
                desc: "Glacial Drift",
                humidity: 82,
                wind: 28,
                color: "#A5B5C2", // Ice Blue
                bg: "bg-[#0f172a]",
                coordinates: "64.14N, 21.94W"
            },
            {
                id: 3,
                name: "MARRAKESH",
                country: "MAR",
                temp: 34,
                condition: "Sun",
                desc: "Desert Haze",
                humidity: 20,
                wind: 8,
                color: "#D94E1F", // Burnt Orange
                bg: "bg-[#291410]",
                coordinates: "31.62N, 7.98W"
            },
            {
                id: 4,
                name: "LONDON",
                country: "GBR",
                temp: 11,
                condition: "Rain",
                desc: "Velvet Drizzle",
                humidity: 91,
                wind: 18,
                color: "#5C6B73", // Slate
                bg: "bg-[#111315]",
                coordinates: "51.50N, 0.12W"
            }
        ];

        // --- 2. Three.js Visualizer Component ---
        const WeatherVisualizer = ({ condition, active }) => {
            const mountRef = useRef(null);
            
            useEffect(() => {
                if (!mountRef.current) return;

                // Setup Scene
                const scene = new THREE.Scene();
                // Transparent background to blend with CSS
                scene.background = null; 

                const camera = new THREE.PerspectiveCamera(75, mountRef.current.clientWidth / mountRef.current.clientHeight, 0.1, 1000);
                camera.position.z = 4;

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: "high-performance" });
                renderer.setSize(mountRef.current.clientWidth, mountRef.current.clientHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                mountRef.current.appendChild(renderer.domElement);

                // Lighting
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                const dirLight = new THREE.DirectionalLight(0xffffff, 1);
                dirLight.position.set(5, 5, 5);
                scene.add(dirLight);

                // Objects based on condition
                let mesh, particles;
                const clock = new THREE.Clock();

                // Material Library
                const wireframeMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0xffffff, 
                    wireframe: true, 
                    transparent: true, 
                    opacity: 0.15 
                });
                
                const glassMaterial = new THREE.MeshPhysicalMaterial({
                    roughness: 0.2,
                    transmission: 0.9,
                    thickness: 1,
                    color: 0xffffff,
                    clearcoat: 1,
                    clearcoatRoughness: 0.1,
                });

                if (condition === "Clear") {
                    // Abstract Moon/Planet: Icosahedron
                    const geometry = new THREE.IcosahedronGeometry(1.5, 1);
                    mesh = new THREE.Mesh(geometry, wireframeMaterial);
                    
                    // Inner glowing core
                    const coreGeo = new THREE.SphereGeometry(0.8, 32, 32);
                    const coreMat = new THREE.MeshBasicMaterial({ color: 0xD4AF37 });
                    const core = new THREE.Mesh(coreGeo, coreMat);
                    mesh.add(core);
                    
                    scene.add(mesh);
                } 
                else if (condition === "Sun") {
                    // Abstract Sun: Torus Knot
                    const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
                    mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({
                        color: 0xD94E1F,
                        emissive: 0xaa2200,
                        roughness: 0.4,
                        metalness: 0.8,
                        wireframe: true
                    }));
                    scene.add(mesh);
                }
                else if (condition === "Snow") {
                    // Particle System for Snow
                    const particleCount = 200;
                    const geometry = new THREE.BufferGeometry();
                    const positions = new Float32Array(particleCount * 3);
                    const velocities = [];

                    for(let i=0; i<particleCount; i++) {
                        positions[i*3] = (Math.random() - 0.5) * 10;
                        positions[i*3+1] = (Math.random() - 0.5) * 10;
                        positions[i*3+2] = (Math.random() - 0.5) * 5;
                        velocities.push({
                            y: -Math.random() * 0.05,
                            x: (Math.random() - 0.5) * 0.01
                        });
                    }

                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    const material = new THREE.PointsMaterial({ color: 0xA5B5C2, size: 0.05, transparent: true, opacity: 0.8 });
                    particles = new THREE.Points(geometry, material);
                    particles.userData = { velocities };
                    scene.add(particles);

                    // Add a central geometric ice crystal
                    const crystalGeo = new THREE.OctahedronGeometry(1.2, 0);
                    mesh = new THREE.Mesh(crystalGeo, wireframeMaterial);
                    scene.add(mesh);
                }
                else if (condition === "Rain") {
                    // Rain streaks
                    const count = 300;
                    const geometry = new THREE.BufferGeometry();
                    const positions = [];
                    
                    for(let i=0; i<count; i++) {
                        positions.push((Math.random() - 0.5) * 8);
                        positions.push((Math.random() - 0.5) * 10);
                        positions.push((Math.random() - 0.5) * 5);
                    }
                    
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                    const material = new THREE.PointsMaterial({ 
                        color: 0x88ccff, 
                        size: 0.03, 
                        transparent: true,
                        opacity: 0.6,
                        blending: THREE.AdditiveBlending
                    });
                    particles = new THREE.Points(geometry, material);
                    scene.add(particles);

                    // Add clouds abstract
                    const cloudGeo = new THREE.DodecahedronGeometry(1.4, 0);
                    mesh = new THREE.Mesh(cloudGeo, new THREE.MeshStandardMaterial({ color: 0x444444, wireframe: true, transparent: true, opacity: 0.2 }));
                    scene.add(mesh);
                }

                // Animation Loop
                let animationId;
                const animate = () => {
                    animationId = requestAnimationFrame(animate);
                    const time = clock.getElapsedTime();

                    if (mesh) {
                        mesh.rotation.x = time * 0.2;
                        mesh.rotation.y = time * 0.3;
                        
                        if (condition === "Clear") {
                            mesh.scale.setScalar(1 + Math.sin(time) * 0.05);
                        }
                    }

                    if (particles && condition === "Snow") {
                         const positions = particles.geometry.attributes.position.array;
                         for(let i=0; i < 200; i++) {
                             positions[i*3+1] += particles.userData.velocities[i].y;
                             if(positions[i*3+1] < -5) positions[i*3+1] = 5;
                         }
                         particles.geometry.attributes.position.needsUpdate = true;
                         particles.rotation.y = time * 0.1;
                    }

                    if (particles && condition === "Rain") {
                         const positions = particles.geometry.attributes.position.array;
                         for(let i=0; i < 300; i++) {
                             positions[i*3+1] -= 0.15; // Rain falls fast
                             if(positions[i*3+1] < -5) positions[i*3+1] = 5;
                         }
                         particles.geometry.attributes.position.needsUpdate = true;
                    }

                    renderer.render(scene, camera);
                };

                animate();

                // Cleanup
                return () => {
                    cancelAnimationFrame(animationId);
                    
                    // Safe DOM removal
                    if (mountRef.current && renderer.domElement) {
                        if (mountRef.current.contains(renderer.domElement)) {
                            mountRef.current.removeChild(renderer.domElement);
                        }
                    }

                    // Robust Clean-up: Traverse scene to dispose all geometries and materials
                    // This fixes the 'ReferenceError: geometry is not defined' by avoiding specific variable names
                    scene.traverse((object) => {
                        if (object.isMesh || object.isPoints) {
                            if (object.geometry) {
                                object.geometry.dispose();
                            }
                            if (object.material) {
                                if (Array.isArray(object.material)) {
                                    object.material.forEach(m => m.dispose());
                                } else {
                                    object.material.dispose();
                                }
                            }
                        }
                    });

                    // Explicitly dispose of materials created in the scope but possibly unused in scene
                    wireframeMaterial.dispose();
                    glassMaterial.dispose();
                    
                    renderer.dispose();
                };
            }, [condition]);

            return <div ref={mountRef} className="w-full h-full absolute top-0 left-0 z-0 opacity-80" />;
        };

        // --- 3. UI Components ---

        const WeatherIcon = ({ condition, className }) => {
            if (condition === "Clear") return <Sun className={className} />;
            if (condition === "Snow") return <Snowflake className={className} />;
            if (condition === "Sun") return <Sun className={className} />;
            if (condition === "Rain") return <CloudRain className={className} />;
            return <Cloud className={className} />;
        };

        const DetailItem = ({ label, value, unit }) => (
            <div className="flex flex-col border-l border-white/20 pl-4">
                <span className="text-[10px] font-mono tracking-widest uppercase text-white/50 mb-1">{label}</span>
                <span className="text-lg font-sans font-medium text-white">{value}<span className="text-xs ml-1 text-white/60">{unit}</span></span>
            </div>
        );

        // --- 4. Main App ---

        const App = () => {
            const [activeId, setActiveId] = useState(1);

            return (
                <div className="w-screen h-screen bg-void text-paper relative flex items-center justify-center p-4 md:p-12 overflow-hidden">
                    <div className="noise-overlay"></div>
                    
                    {/* Background Ambient Gradient based on active card */}
                    <div className="absolute inset-0 transition-colors duration-1000 ease-in-out z-0"
                        style={{ backgroundColor: activeId === 1 ? '#080808' : activeId === 2 ? '#0b1120' : activeId === 3 ? '#1a0b08' : '#080a0a' }}>
                    </div>

                    {/* Main Layout: Horizontal Accordion */}
                    <div className="relative z-10 w-full max-w-7xl h-[85vh] flex flex-col md:flex-row gap-2 md:gap-4">
                        
                        {CITIES.map((city) => {
                            const isActive = activeId === city.id;

                            return (
                                <motion.div 
                                    key={city.id}
                                    layout
                                    onClick={() => setActiveId(city.id)}
                                    className={`
                                        relative overflow-hidden cursor-pointer
                                        transition-all duration-700 ease-[0.22, 1, 0.36, 1]
                                        ${isActive ? 'flex-[4] md:flex-[5] opacity-100' : 'flex-[1] opacity-60 hover:opacity-80'}
                                        ${city.bg} rounded-none border border-white/10 group
                                    `}
                                    style={{
                                        // Brutalist aesthetics: Sharp corners or very subtle rounding
                                        borderRadius: '4px' 
                                    }}
                                >
                                    {/* Vertical Text Label (When inactive) */}
                                    {!isActive && (
                                        <div className="absolute inset-0 flex items-center justify-center md:justify-end md:pb-12 md:flex-col pointer-events-none">
                                            <h2 className="md:-rotate-90 text-xl md:text-3xl font-serif tracking-widest whitespace-nowrap text-white/40 group-hover:text-white transition-colors duration-300">
                                                {city.name}
                                            </h2>
                                            <span className="mt-4 md:mt-0 md:mb-4 text-xs font-mono text-white/30">{city.temp}°</span>
                                        </div>
                                    )}

                                    {/* Active Content */}
                                    <div className="w-full h-full relative">
                                        
                                        {/* 3D Scene Layer */}
                                        <div className={`absolute inset-0 transition-opacity duration-1000 ${isActive ? 'opacity-100 delay-300' : 'opacity-0'}`}>
                                            {isActive && <WeatherVisualizer condition={city.condition} active={isActive} />}
                                        </div>

                                        {/* Content Overlay */}
                                        <div className="absolute inset-0 p-8 md:p-12 flex flex-col justify-between z-10">
                                            
                                            {/* Header */}
                                            <div className={`flex justify-between items-start transition-all duration-500 ${isActive ? 'translate-y-0 opacity-100' : '-translate-y-10 opacity-0'}`}>
                                                <div>
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <span className="w-2 h-2 bg-current rounded-full animate-pulse" style={{ color: city.color }}></span>
                                                        <span className="font-mono text-xs tracking-[0.2em] text-white/60">LIVE WEATHER DATA</span>
                                                    </div>
                                                    <h1 className="text-5xl md:text-8xl font-serif font-light tracking-tighter leading-none mt-2">
                                                        {city.name}
                                                    </h1>
                                                    <p className="font-mono text-sm text-white/50 mt-2 tracking-wide flex items-center gap-2">
                                                        <MapPin size={12} /> {city.country} — {city.coordinates}
                                                    </p>
                                                </div>
                                                
                                                {/* Date/Time badge */}
                                                <div className="hidden md:block border border-white/20 px-4 py-2 rounded-full backdrop-blur-md bg-white/5">
                                                    <span className="font-mono text-xs">{new Date().toLocaleDateString('en-GB')}</span>
                                                </div>
                                            </div>

                                            {/* Bottom Info Grid */}
                                            <div className={`transition-all duration-700 delay-100 ${isActive ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
                                                
                                                <div className="flex flex-col md:flex-row items-end md:items-end justify-between gap-8">
                                                    
                                                    {/* Big Temp */}
                                                    <div className="flex items-start gap-4">
                                                        <div className="text-[8rem] md:text-[10rem] leading-[0.8] font-serif tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-white/40">
                                                            {city.temp}°
                                                        </div>
                                                        <div className="mt-4 md:mt-8">
                                                            <div className="text-2xl font-light italic text-white/80">{city.desc}</div>
                                                            <div className="text-sm font-mono text-white/40 mt-1 uppercase tracking-wider">{city.condition}</div>
                                                        </div>
                                                    </div>

                                                    {/* Metrics Grid */}
                                                    <div className="grid grid-cols-2 gap-8 md:gap-12 w-full md:w-auto p-6 backdrop-blur-lg bg-black/20 border border-white/10">
                                                        <DetailItem label="WIND SPEED" value={city.wind} unit="km/h" />
                                                        <DetailItem label="HUMIDITY" value={city.humidity} unit="%" />
                                                        <DetailItem label="PRECIPITATION" value={city.condition === 'Rain' ? '82' : '0'} unit="%" />
                                                        <DetailItem label="PRESSURE" value="1012" unit="hPa" />
                                                    </div>

                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Hover Reveal Effect (Border Flash) */}
                                    <div className="absolute inset-0 border-2 border-transparent group-hover:border-white/20 transition-colors pointer-events-none" />
                                    
                                </motion.div>
                            );
                        })}
                    </div>

                    {/* Footer / Copyright */}
                    <div className="absolute bottom-4 left-0 w-full text-center pointer-events-none">
                         <p className="text-[10px] font-mono text-white/20 uppercase tracking-[0.3em]">
                             Constructed with React Three Fiber & Tailwind
                         </p>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
